name: "Deploy to staging"
on:
  push:
    branches: ["main"]

jobs:
  redeploy_everything:
    runs-on: "ubuntu-latest"
    name: "Deploying everything to the staging clustur"
    steps:
      - run: |
          echo "${{secrets.SSH_PRIVATE_KEY}}" &> ~/ssh_key
          mkdir -p ~/.ssh 
          touch ~/.ssh/known_hosts
          echo "${{secrets.KNOWN_HOSTS}}" &> ~/.ssh/known_hosts
          chmod 600 ~/ssh_key 
          ssh -i ~/ssh_key adarsh@98.70.26.188 -t "cd monorepo-deploy-learn/ && git pull origin main && source ~/.bashrc && npm install -g pnpm && pnpm install && pnpm run build && pm2  restart ws-backend http-backend web "
